<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ArbiMine • Paystack Integration</title>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b1220; font-family: 'Inter', system-ui, sans-serif; color: #eef2ff; padding-bottom: 70px; }
    .auth-container { max-width: 420px; margin: 60px auto; padding: 24px; background: #111a2e; border-radius: 28px; }
    .auth-container input { width: 100%; padding: 14px; margin: 8px 0; background: #0f172f; border: 1px solid #1e2a4a; border-radius: 18px; color: white; }
    .auth-container button { width: 100%; padding: 14px; background: #00ff99; border: none; border-radius: 40px; font-weight: bold; margin-top: 16px; cursor: pointer; }
    .toggle-link { text-align: center; margin-top: 20px; color: #5cb3ff; cursor: pointer; }
    .dashboard { display: none; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111a2e; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #1e2a4a; z-index: 100; }
    .nav-item { background: none; border: none; color: #8e9ab0; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .nav-item .icon { font-size: 24px; }
    .nav-item.active { color: #00ff99; }
    .section { display: none; padding: 20px 16px; }
    .section.active { display: block; }
    h3 { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; font-size: 22px; }
    .refresh-btn, .sort-select, .filter-select { background: #1e2a4a; border: none; color: white; padding: 8px 12px; border-radius: 40px; cursor: pointer; }
    .card { background: #111a2e; border-radius: 20px; padding: 16px; margin-bottom: 14px; cursor: pointer; border: 1px solid #1f2a46; transition: 0.1s; }
    .card:active { transform: scale(0.99); }
    .symbol { font-size: 18px; font-weight: bold; color: #00ff99; margin-bottom: 8px; }
    .row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 14px; }
    .badge { padding: 4px 10px; border-radius: 40px; font-size: 12px; display: inline-block; }
    .green { background: #0f5132; color: #00ff99; }
    .red { background: #5a1a1a; color: #ff8a8a; }
    .yellow { background: #5a4a1a; color: #ffcc00; }
    .loading { text-align: center; padding: 32px; color: #8e9ab0; }
    .pro-card { background: linear-gradient(135deg, #0f1a2e, #0a1020); border-radius: 28px; padding: 24px; margin-bottom: 20px; border: 1px solid #2a3a60; }
    .plan-name { font-size: 28px; font-weight: bold; background: linear-gradient(90deg, #00ff99, #00ccff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .price { font-size: 42px; font-weight: bold; margin: 12px 0; }
    .pro-input { width: 100%; padding: 12px; margin: 12px 0; background: #0f172f; border: 1px solid #1e2a4a; border-radius: 20px; color: white; font-size: 16px; }
    .btn-pro { background: #00ff99; color: #0b1220; font-weight: bold; border: none; border-radius: 60px; padding: 14px; width: 100%; font-size: 18px; cursor: pointer; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 20px; }
    .modal-content { max-width: 600px; margin: 20px auto; background: #0f172f; border-radius: 32px; padding: 24px; position: relative; }
    .close-modal { position: absolute; top: 16px; right: 20px; font-size: 28px; cursor: pointer; }
    .exchange-columns { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; }
    .exchange-card { flex: 1; background: #0a1020; border-radius: 20px; padding: 16px; }
    .exchange-title { font-size: 18px; font-weight: bold; color: #7cb9ff; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-left: 8px; }
    .network-table { margin-top: 20px; background: #0a1020; border-radius: 20px; overflow: hidden; }
    .network-row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #1e2a4a; }
    .risk-low { background: #0f5132; color: #00ff99; }
    .risk-medium { background: #5a4a1a; color: #ffcc00; }
    .risk-high { background: #5a1a1a; color: #ff8a8a; }
    #chart { margin-top: 20px; background: #0a1020; border-radius: 20px; padding: 12px; }
  </style>
</head>
<body>
<div id="authContainer" class="auth-container">
  <div id="loginPanel">
    <h2>🔓 ArbiMine</h2>
    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>
    <button onclick="login()">Login →</button>
    <div class="toggle-link" onclick="showRegister()">Create account</div>
  </div>
  <div id="registerPanel" style="display:none;">
    <h2>📝 Register</h2>
    <input type="text" id="regUsername" placeholder="Username" required>
    <input type="email" id="regEmail" placeholder="Email" required>
    <input type="tel" id="regMpesa" placeholder="Mobile number (e.g., 0712345678)" required>
    <input type="password" id="regPassword" placeholder="Password" required>
    <button onclick="register()">Register</button>
    <div class="toggle-link" onclick="showLogin()">Back to Login</div>
  </div>
</div>

<div id="dashboard" class="dashboard">
  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home', event)"><span class="icon">🏠</span><span>Home</span></button>
    <button class="nav-item" onclick="switchTab('pro', event)"><span class="icon">💎</span><span>Pro</span></button>
    <button class="nav-item" onclick="switchTab('profile', event)"><span class="icon">👤</span><span>Profile</span></button>
  </div>

  <div id="home" class="section active">
    <h3>📡 Live Arbitrage
      <div style="display: flex; gap: 8px;">
        <button class="refresh-btn" onclick="refreshOpportunities()">🔄</button>
        <select id="sortSelect" class="sort-select" onchange="loadAndRender()">
          <option value="spreadDesc">Spread high-low</option>
          <option value="symbolAsc">Symbol A-Z</option>
        </select>
        <select id="rangeFilter" class="filter-select" onchange="loadAndRender()">
          <option value="all">All spreads</option>
          <option value="0.2-1">0.2% - 1%</option>
          <option value="1-5">1% - 5%</option>
          <option value="5+">5% +</option>
        </select>
      </div>
    </h3>
    <div id="oppList" class="loading">Loading opportunities...</div>
  </div>

  <div id="pro" class="section">
    <h3>💎 Unlock Pro</h3>
    <div class="pro-card">
      <div class="plan-name">Weekly Boost</div>
      <div class="price">100 KES</div>
      <input type="tel" id="weeklyPhone" class="pro-input" placeholder="M-Pesa number (optional for Paystack)">
      <button class="btn-pro" onclick="payPro('weekly', 100)">Pay with Paystack</button>
    </div>
    <div class="pro-card">
      <div class="plan-name">Monthly Max</div>
      <div class="price">350 KES</div>
      <input type="tel" id="monthlyPhone" class="pro-input" placeholder="M-Pesa number (optional for Paystack)">
      <button class="btn-pro" onclick="payPro('monthly', 350)">Pay with Paystack</button>
    </div>
  </div>

  <div id="profile" class="section">
    <h3>👤 Profile</h3>
    <div id="profileCard" class="loading">Loading...</div>
    <button class="btn-pro" style="background:#334155; margin-top:20px;" onclick="logout()">Logout</button>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeDetail()">&times;</span>
    <div id="modalBody">Loading details...</div>
    <div id="chart"></div>
  </div>
</div>

<script>
  let token = localStorage.getItem('token');
  let allOpportunities = [];
  let currentChart = null;

  window.onload = () => { if (token) verifyAndShowDashboard(); else showAuth(); };

  function isValidEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
  function isValidPhone(phone) { return /^(07|01|\+254|254)\d{8,12}$/.test(phone.replace(/\D/g, '').replace(/^0/, '254')); }

  async function verifyAndShowDashboard() {
    try {
      const res = await fetch('/api/me', { headers: { Authorization: token } });
      const data = await res.json();
      if (data.username) {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadOpps();
        loadProfile();
      } else throw new Error();
    } catch { localStorage.removeItem('token'); token = null; showAuth(); }
  }

  function showAuth() { document.getElementById('authContainer').style.display = 'block'; document.getElementById('dashboard').style.display = 'none'; }
  function showRegister() { document.getElementById('loginPanel').style.display = 'none'; document.getElementById('registerPanel').style.display = 'block'; }
  function showLogin() { document.getElementById('registerPanel').style.display = 'none'; document.getElementById('loginPanel').style.display = 'block'; }

  async function register() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const mpesa = document.getElementById('regMpesa').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!username || !email || !mpesa || !password) { alert('All fields required'); return; }
    if (!isValidEmail(email)) { alert('Please enter a valid email address'); return; }
    if (!isValidPhone(mpesa)) { alert('Please enter a valid Kenyan mobile number (e.g., 0712345678)'); return; }
    if (password.length < 4) { alert('Password must be at least 4 characters'); return; }
    try {
      const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, mpesa, password }) });
      const data = await res.json();
      if (data.token) { localStorage.setItem('token', data.token); token = data.token; verifyAndShowDashboard(); }
      else alert(data.error);
    } catch { alert('Server error'); }
  }

  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { alert('Email and password required'); return; }
    try {
      const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (data.token) { localStorage.setItem('token', data.token); token = data.token; verifyAndShowDashboard(); }
      else alert(data.error || 'Invalid credentials');
    } catch { alert('Login error'); }
  }

  function logout() { localStorage.removeItem('token'); location.reload(); }

  function switchTab(tabId, event) {
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    if (event?.target) event.target.closest('.nav-item').classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    if (tabId === 'home') loadOpps();
    if (tabId === 'profile') loadProfile();
  }

  async function refreshOpportunities() { await loadOpps(); }

  async function loadOpps() {
    const container = document.getElementById('oppList');
    container.innerHTML = '<div class="loading">Loading opportunities...</div>';
    try {
      const res = await fetch('/api/opportunities');
      const data = await res.json();
      if (!data.opportunities || data.opportunities.length === 0) { container.innerHTML = '<div class="card">No spreads >0.2% found.</div>'; return; }
      allOpportunities = data.opportunities;
      loadAndRender();
    } catch { container.innerHTML = '<div class="card red">Failed to load.</div>'; }
  }

  function loadAndRender() {
    let filtered = [...allOpportunities];
    const range = document.getElementById('rangeFilter').value;
    if (range !== 'all') {
      const [min, max] = range === '5+' ? [5, Infinity] : range.split('-').map(Number);
      filtered = filtered.filter(o => parseFloat(o.spread) >= min && (max ? parseFloat(o.spread) <= max : true));
    }
    const sortBy = document.getElementById('sortSelect').value;
    if (sortBy === 'spreadDesc') filtered.sort((a,b) => parseFloat(b.spread) - parseFloat(a.spread));
    if (sortBy === 'symbolAsc') filtered.sort((a,b) => a.symbol.localeCompare(b.symbol));
    renderOppsList(filtered);
  }

  function renderOppsList(opps) {
    const container = document.getElementById('oppList');
    container.innerHTML = '';
    for (const opp of opps) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="symbol">${opp.symbol}</div>
        <div class="row"><span>${opp.buyExchange}</span><span>💰 ${opp.buyPrice}</span></div>
        <div class="row"><span>${opp.sellExchange}</span><span>💰 ${opp.sellPrice}</span></div>
        <div class="row"><span>Spread</span><span class="badge green">${opp.spread}%</span></div>
      `;
      card.onclick = () => showDetail(opp.id);
      container.appendChild(card);
    }
  }

  async function showDetail(oppId) {
    const modal = document.getElementById('detailModal');
    const modalBody = document.getElementById('modalBody');
    modalBody.innerHTML = '<div class="loading">Fetching real network data...</div>';
    modal.style.display = 'block';
    if (currentChart) currentChart.destroy();
    try {
      const res = await fetch(`/api/opportunity/${oppId}/details`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      displayDetailModal(data);
    } catch (err) {
      modalBody.innerHTML = `<div class="red" style="padding:20px">Failed to load details: ${err.message}</div>`;
    }
  }

  function getStatusBadge(status) {
    if (status === true) return '<span class="status-badge green">Available</span>';
    if (status === false) return '<span class="status-badge red">Disabled</span>';
    return '<span class="status-badge yellow">Unverified</span>';
  }

  function displayDetailModal(opp) {
    const modalBody = document.getElementById('modalBody');
    const riskColor = opp.risk === 'low' ? 'risk-low' : (opp.risk === 'medium' ? 'risk-medium' : 'risk-high');
    const tradableText = opp.tradable ? 'TRADABLE ✅' : 'NOT TRADABLE ❌';
    const tradableClass = opp.tradable ? 'green' : 'red';
    const buyStatus = opp.buyWithdraw;
    const sellStatus = opp.sellDeposit;

    function networkRows(networks) {
      if (!networks || Object.keys(networks).length === 0) return '<div class="network-row"><span>No network data available</span></div>';
      return Object.values(networks).map(n => {
        const depBadge = n.deposit === true ? '<span class="status-badge green">Available</span>' : (n.deposit === false ? '<span class="status-badge red">Disabled</span>' : '<span class="status-badge yellow">Unverified</span>');
        const wdBadge = n.withdraw === true ? '<span class="status-badge green">Available</span>' : (n.withdraw === false ? '<span class="status-badge red">Disabled</span>' : '<span class="status-badge yellow">Unverified</span>');
        return `
          <div class="network-row">
            <div class="network-name">${n.name}</div>
            <div class="network-details">
              Deposit: ${depBadge} | Withdraw: ${wdBadge}<br>
              Fee: ${typeof n.fee === 'number' ? n.fee : 'variable'}<br>
              Min Withdraw: ${n.minWithdraw || 'N/A'}
            </div>
          </div>
        `;
      }).join('');
    }

    modalBody.innerHTML = `
      <div class="modal-symbol">${opp.symbol}</div>
      <div class="modal-spread">Spread: <span style="color:#00ff99">${opp.spread}%</span></div>
      <div><span class="badge ${tradableClass}">${tradableText}</span>
      <span class="badge ${riskColor}" style="margin-left:10px">Risk: ${opp.risk.toUpperCase()}</span></div>
      <div class="exchange-columns">
        <div class="exchange-card"><div class="exchange-title">Buy: ${opp.buyExchange}</div><div class="price">$${opp.buyPrice}</div><div class="status">Withdraw: ${getStatusBadge(buyStatus)}</div><div class="liquidity">Liquidity: $${opp.liquidity}</div></div>
        <div class="exchange-card"><div class="exchange-title">Sell: ${opp.sellExchange}</div><div class="price">$${opp.sellPrice}</div><div class="status">Deposit: ${getStatusBadge(sellStatus)}</div><div class="liquidity">Liquidity: $${opp.liquidity}</div></div>
      </div>
      <h4>Networks (${opp.buyExchange})</h4><div class="network-table">${networkRows(opp.buyNetworks)}</div>
      <h4>Networks (${opp.sellExchange})</h4><div class="network-table">${networkRows(opp.sellNetworks)}</div>
    `;
    document.getElementById('chart').style.display = 'none';
  }

  function closeDetail() {
    document.getElementById('detailModal').style.display = 'none';
    if (currentChart) currentChart.destroy();
  }

  async function loadProfile() {
    const container = document.getElementById('profileCard');
    container.innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await fetch('/api/me', { headers: { Authorization: token } });
      const user = await res.json();
      if (user.error) throw new Error();
      container.innerHTML = `<div class="card"><div class="row"><span>👤 Username:</span><span>${user.username}</span></div><div class="row"><span>📧 Email:</span><span>${user.email}</span></div><div class="row"><span>📱 Mobile:</span><span>${user.mpesa}</span></div></div>`;
    } catch { container.innerHTML = '<div class="card red">Session expired.</div>'; }
  }

  // UPDATED payPro for Paystack redirect
  async function payPro(plan, amount) {
    if (!token) { alert('Please login first'); return; }
    // Phone number is optional for Paystack, but we keep it for consistency
    const phoneInput = plan === 'weekly' ? document.getElementById('weeklyPhone') : document.getElementById('monthlyPhone');
    const phone = phoneInput.value.trim();
    // No phone validation needed, but we can ignore it.
    try {
      const res = await fetch('/api/pesapal/pay', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: token },
        body: JSON.stringify({ plan, amount })  // phone not required by backend
      });
      const data = await res.json();
      if (data.success && data.authorizationUrl) {
        // Redirect user to Paystack payment page
        window.location.href = data.authorizationUrl;
      } else {
        alert(data.error || 'Payment initialization failed');
      }
    } catch (err) {
      alert('Payment request failed. Please try again.');
    }
  }
</script>
</body>
</html>
