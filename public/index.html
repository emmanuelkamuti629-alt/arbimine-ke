<script>

// ========================== MASSIVE OPPORTUNITIES ==========================

const opportunities = [];

const exchanges = [
"BINANCE",
"BYBIT",
"MEXC",
"KUCOIN",
"HTX",
"GATEIO",
"BITMART",
"OKX",
"BITGET"
];

const coins = [
"BTC","ETH","SOL","XRP","DOGE","ARB","SUI","TON","PEPE","FLOKI",
"GMX","FET","SWEAT","APT","SEI","TRX","LTC","ADA","AVAX","LINK",
"ATOM","NEAR","TIA","OP","RNDR","BONK","SHIB","WIF","INJ","ICP"
];

// GENERATE MANY OPPORTUNITIES

for(let i=0;i<1000;i++){

const buyExchange=exchanges[Math.floor(Math.random()*exchanges.length)];
const sellExchange=exchanges[Math.floor(Math.random()*exchanges.length)];

const buyPrice=(Math.random()*100).toFixed(6);
const spread=(Math.random()*25+1).toFixed(2);

const sellPrice=(
parseFloat(buyPrice)+
(parseFloat(buyPrice)*(spread/100))
).toFixed(6);

opportunities.push({

coin:coins[Math.floor(Math.random()*coins.length)],

buyExchange,

sellExchange,

buyPrice,

sellPrice,

spread:parseFloat(spread),

buyLiquidity:"$"+(Math.floor(Math.random()*900)+100)+"K",

sellLiquidity:"$"+(Math.floor(Math.random()*900)+100)+"K",

withdrawOpen:true,

depositOpen:true,

risk:
spread > 18
?"LOW"
:spread > 10
?"MEDIUM"
:"HIGH",

riskText:
spread > 18
?"Strong spread and high liquidity."
:"Spread volatility detected.",

networks:[
{
name:"TRC20",
fee:(Math.random()*3).toFixed(2),
arrival:"1-3 mins",
status:"ACTIVE"
},
{
name:"ERC20",
fee:(Math.random()*12).toFixed(2),
arrival:"5-20 mins",
status:"ACTIVE"
},
{
name:"BEP20",
fee:(Math.random()*5).toFixed(2),
arrival:"2-5 mins",
status:"ACTIVE"
}
],

trend:[
Math.random()*10,
Math.random()*12,
Math.random()*13,
Math.random()*14,
Math.random()*15,
Math.random()*16,
Math.random()*17,
Math.random()*18,
Math.random()*20,
spread
]

});

}

// ========================== RENDER ==========================

function renderOpportunities(){

const container=document.getElementById("opportunitiesContainer");

container.innerHTML="";

const sorted=opportunities.sort((a,b)=>b.spread-a.spread);

sorted.forEach((opp,index)=>{

container.innerHTML+=`

<div class="card glow p-5 opportunity-card"
onclick="openDetails(${index})">

<div class="flex justify-between items-start gap-4">

<div>

<div class="flex items-center gap-2 flex-wrap">

<h2 class="text-2xl font-bold">
${opp.coin}
</h2>

<div class="bg-green-500/20 text-green-400 px-2 py-1 rounded-lg text-xs">
LIVE
</div>

<div class="bg-slate-800 text-slate-300 px-2 py-1 rounded-lg text-xs">
${opp.risk} RISK
</div>

</div>

<p class="text-slate-400 mt-2 text-sm">
${opp.buyExchange} → ${opp.sellExchange}
</p>

<div class="grid grid-cols-3 gap-4 mt-4 text-sm">

<div>
<div class="text-slate-500">
Buy
</div>

<div class="font-bold">
$${opp.buyPrice}
</div>
</div>

<div>
<div class="text-slate-500">
Sell
</div>

<div class="font-bold">
$${opp.sellPrice}
</div>
</div>

<div>
<div class="text-slate-500">
Liquidity
</div>

<div class="font-bold">
${opp.buyLiquidity}
</div>
</div>

</div>

</div>

<div class="text-right">

<div class="text-4xl font-bold green">
${opp.spread}%
</div>

<div class="text-slate-400 text-sm mt-1">
Profit Spread
</div>

</div>

</div>

</div>

`;

});

}

// ========================== PAYSTACK ==========================

function payNow(plan){

alert(
"Please wait as you are being directed to payment channel..."
);

setTimeout(()=>{

if(plan==="weekly"){

window.location.href=
"https://paystack.com/pay/arbimine-weekly";

}else{

window.location.href=
"https://paystack.com/pay/arbimine-monthly";

}

},1500);

}

</script>
