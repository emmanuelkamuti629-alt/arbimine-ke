<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArbiMine Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#020617;
    color:white;
    font-family:Arial,sans-serif;
}

.glass{
    background:rgba(15,23,42,.8);
    border:1px solid rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
}

.card{
    transition:.2s;
}

.card:hover{
    transform:translateY(-2px);
}

.hiddenPage{
    display:none;
}

.activePage{
    display:block;
}

.navBtn{
    flex:1;
    padding:12px;
    text-align:center;
    font-size:13px;
    color:#94a3b8;
}

.navBtn.active{
    color:white;
    background:#1e293b;
}

.networkBox{
    background:#0f172a;
    border:1px solid rgba(255,255,255,.05);
    border-radius:12px;
    padding:10px;
    margin-top:8px;
}

.green{
    color:#22c55e;
}

.red{
    color:#ef4444;
}

.yellow{
    color:#f59e0b;
}
</style>
</head>

<body>

<!-- AUTH PAGE -->
<div id="authPage" class="min-h-screen flex items-center justify-center p-4">

<div class="glass w-full max-w-md rounded-3xl p-6">

<h1 class="text-3xl font-bold text-center mb-2">
⚡ ArbiMine
</h1>

<p class="text-center text-slate-400 mb-6">
Crypto Arbitrage Intelligence
</p>

<input id="username"
class="w-full bg-slate-900 rounded-xl p-4 mb-4 outline-none"
placeholder="Username">

<input id="password"
type="password"
class="w-full bg-slate-900 rounded-xl p-4 mb-4 outline-none"
placeholder="Password">

<button onclick="register()"
class="w-full bg-indigo-600 py-4 rounded-xl font-bold mb-3">
Create Account
</button>

<button onclick="login()"
class="w-full bg-slate-800 py-4 rounded-xl font-bold">
Login
</button>

<p id="authMsg" class="text-center text-sm mt-4 text-slate-400"></p>

</div>
</div>

<!-- APP PAGE -->
<div id="appPage" class="hiddenPage">

<!-- HEADER -->
<div class="p-4 border-b border-slate-800 flex justify-between items-center">

<div>
<h1 class="text-2xl font-bold">
⚡ ArbiMine Pro
</h1>
<p class="text-slate-400 text-sm">
Real Networks • Real Liquidity
</p>
</div>

<div class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-sm">
LIVE
</div>

</div>

<!-- HOME PAGE -->
<div id="homePage" class="activePage p-4 pb-28">

<div id="opportunitiesContainer" class="space-y-4"></div>

</div>

<!-- DETAILS PAGE -->
<div id="detailsPage" class="hiddenPage p-4 pb-28">

<button onclick="backHome()"
class="mb-4 bg-slate-800 px-4 py-3 rounded-xl">
← Back
</button>

<div class="glass rounded-3xl p-5">

<h2 id="coinName"
class="text-3xl font-bold mb-4">
BTC
</h2>

<div class="grid grid-cols-2 gap-3 mb-4">

<div class="bg-green-500/10 p-4 rounded-2xl">
<p class="text-slate-400 text-sm">BUY</p>
<h3 id="buyExchange" class="text-xl font-bold"></h3>
<p id="buyPrice" class="green"></p>
</div>

<div class="bg-red-500/10 p-4 rounded-2xl">
<p class="text-slate-400 text-sm">SELL</p>
<h3 id="sellExchange" class="text-xl font-bold"></h3>
<p id="sellPrice" class="red"></p>
</div>

</div>

<div class="glass rounded-2xl p-4 mb-4">

<div class="flex justify-between mb-2">
<span>Spread</span>
<span id="spread" class="green font-bold"></span>
</div>

<div class="flex justify-between mb-2">
<span>Liquidity</span>
<span id="liquidity"></span>
</div>

<div class="flex justify-between">
<span>Arrival Time</span>
<span id="arrival"></span>
</div>

</div>

<!-- NETWORKS -->
<div class="glass rounded-2xl p-4 mb-4">

<h3 class="text-xl font-bold mb-3">
Networks
</h3>

<div>

<p class="green font-bold mb-2">
Withdraw Networks
</p>

<div id="withdrawNetworks"></div>

</div>

<div class="mt-4">

<p class="red font-bold mb-2">
Deposit Networks
</p>

<div id="depositNetworks"></div>

</div>

</div>

<!-- RISK -->
<div class="glass rounded-2xl p-4 mb-4">

<h3 class="text-xl font-bold mb-3">
AI Risk Analysis
</h3>

<div id="riskBox"
class="bg-slate-900 rounded-2xl p-4">
</div>

</div>

<!-- GRAPH -->
<div class="glass rounded-2xl p-4">

<h3 class="text-xl font-bold mb-4">
Spread Trend
</h3>

<canvas id="trendChart"></canvas>

</div>

</div>

</div>

<!-- BOTTOM NAV -->
<div class="fixed bottom-0 left-0 right-0 bg-slate-950 border-t border-slate-800 flex">

<button class="navBtn active">
🏠 Home
</button>

<button class="navBtn">
📈 Opportunities
</button>

<button class="navBtn">
👤 Profile
</button>

</div>

</div>

<script>

const API = "";

let chart;

const opportunities = [
{
    coin:"BTC",
    buyExchange:"Binance",
    sellExchange:"KuCoin",
    buyPrice:65000,
    sellPrice:66500,
    spread:2.3,
    liquidity:"$4.2M",
    arrival:"4 mins",
    risk:"LOW",
    withdrawNetworks:[
        {
            name:"BTC",
            fee:"0.0002 BTC",
            eta:"10 mins",
            status:"OPEN"
        },
        {
            name:"Lightning",
            fee:"0.00001 BTC",
            eta:"2 mins",
            status:"OPEN"
        }
    ],
    depositNetworks:[
        {
            name:"BTC",
            fee:"FREE",
            eta:"5 mins",
            status:"OPEN"
        }
    ],
    trend:[1.2,1.4,1.7,1.9,2.1,2.3]
},

{
    coin:"ETH",
    buyExchange:"MEXC",
    sellExchange:"HTX",
    buyPrice:3400,
    sellPrice:3560,
    spread:4.7,
    liquidity:"$1.8M",
    arrival:"3 mins",
    risk:"MEDIUM",
    withdrawNetworks:[
        {
            name:"Arbitrum",
            fee:"0.001 ETH",
            eta:"1 min",
            status:"OPEN"
        },
        {
            name:"ERC20",
            fee:"0.004 ETH",
            eta:"8 mins",
            status:"OPEN"
        }
    ],
    depositNetworks:[
        {
            name:"Arbitrum",
            fee:"FREE",
            eta:"1 min",
            status:"OPEN"
        }
    ],
    trend:[2.1,2.5,2.8,3.2,4.1,4.7]
}
];

function register(){

    const u=document.getElementById("username").value;
    const p=document.getElementById("password").value;

    if(!u || !p){
        document.getElementById("authMsg").innerText="Fill all fields";
        return;
    }

    localStorage.setItem("arbimineUser",u);

    openApp();
}

function login(){

    openApp();
}

function openApp(){

    document.getElementById("authPage").style.display="none";

    document.getElementById("appPage").classList.remove("hiddenPage");

    renderOpportunities();
}

function renderOpportunities(){

    const container=document.getElementById("opportunitiesContainer");

    container.innerHTML="";

    opportunities.forEach((o,index)=>{

        container.innerHTML += `
        
        <div onclick="openDetails(${index})"
        class="card glass rounded-3xl p-5">

        <div class="flex justify-between items-center">

        <div>

        <h2 class="text-2xl font-bold mb-1">
        ${o.coin}
        </h2>

        <p class="text-slate-400 text-sm">
        ${o.buyExchange} → ${o.sellExchange}
        </p>

        </div>

        <div class="text-right">

        <p class="green text-2xl font-bold">
        ${o.spread}%
        </p>

        <p class="text-slate-400 text-sm">
        spread
        </p>

        </div>

        </div>

        <div class="flex justify-between mt-4 text-sm">

        <div>
        <p class="text-slate-500">
        Liquidity
        </p>

        <p>
        ${o.liquidity}
        </p>
        </div>

        <div>
        <p class="text-slate-500">
        Arrival
        </p>

        <p>
        ${o.arrival}
        </p>
        </div>

        <div>
        <p class="text-slate-500">
        Risk
        </p>

        <p class="${
            o.risk=="LOW"
            ?"green"
            :o.risk=="MEDIUM"
            ?"yellow"
            :"red"
        }">
        ${o.risk}
        </p>
        </div>

        </div>

        </div>
        
        `;
    });
}

function openDetails(index){

    const o=opportunities[index];

    document.getElementById("homePage").classList.add("hiddenPage");

    document.getElementById("detailsPage").classList.remove("hiddenPage");

    document.getElementById("coinName").innerText=o.coin;

    document.getElementById("buyExchange").innerText=o.buyExchange;

    document.getElementById("sellExchange").innerText=o.sellExchange;

    document.getElementById("buyPrice").innerText="$"+o.buyPrice;

    document.getElementById("sellPrice").innerText="$"+o.sellPrice;

    document.getElementById("spread").innerText=o.spread+"%";

    document.getElementById("liquidity").innerText=o.liquidity;

    document.getElementById("arrival").innerText=o.arrival;

    document.getElementById("riskBox").innerHTML=`
    
    <div class="flex justify-between items-center">

    <div>

    <p class="text-lg font-bold">
    ${o.risk} RISK
    </p>

    <p class="text-slate-400 text-sm mt-1">
    AI analyzed spread volatility, liquidity and transfer networks.
    </p>

    </div>

    <div class="${
        o.risk=="LOW"
        ?"green"
        :o.risk=="MEDIUM"
        ?"yellow"
        :"red"
    } text-2xl">
    ●
    </div>

    </div>
    
    `;

    document.getElementById("withdrawNetworks").innerHTML=
    o.withdrawNetworks.map(n=>`

        <div class="networkBox">

        <div class="flex justify-between">
        <span>${n.name}</span>
        <span class="green">${n.status}</span>
        </div>

        <div class="text-sm text-slate-400 mt-1">
        Fee: ${n.fee}
        </div>

        <div class="text-sm text-slate-400">
        ETA: ${n.eta}
        </div>

        </div>

    `).join("");

    document.getElementById("depositNetworks").innerHTML=
    o.depositNetworks.map(n=>`

        <div class="networkBox">

        <div class="flex justify-between">
        <span>${n.name}</span>
        <span class="green">${n.status}</span>
        </div>

        <div class="text-sm text-slate-400 mt-1">
        Fee: ${n.fee}
        </div>

        <div class="text-sm text-slate-400">
        ETA: ${n.eta}
        </div>

        </div>

    `).join("");

    if(chart){
        chart.destroy();
    }

    const ctx=document.getElementById("trendChart");

    chart=new Chart(ctx,{
        type:"line",
        data:{
            labels:["1","2","3","4","5","6"],
            datasets:[{
                label:"Spread %",
                data:o.trend,
                borderColor:"#22c55e",
                backgroundColor:"rgba(34,197,94,.2)",
                tension:.4,
                fill:true
            }]
        },
        options:{
            responsive:true,
            plugins:{
                legend:{
                    labels:{
                        color:"white"
                    }
                }
            },
            scales:{
                x:{
                    ticks:{
                        color:"white"
                    }
                },
                y:{
                    ticks:{
                        color:"white"
                    }
                }
            }
        }
    });
}

function backHome(){

    document.getElementById("detailsPage").classList.add("hiddenPage");

    document.getElementById("homePage").classList.remove("hiddenPage");
}

if(localStorage.getItem("arbimineUser")){
    openApp();
}

</script>

</body>
</html>
