<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ArbiMine - Crypto Arbitrage Scanner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:#050816;
  color:white;
  overflow-x:hidden;
}

/* ================= HEADER ================= */

.header{
  padding:18px;
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter:blur(20px);
  background:rgba(5,8,22,0.85);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.logo{
  font-size:28px;
  font-weight:800;
  background:linear-gradient(90deg,#00ff99,#00c2ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.live-box{
  display:flex;
  align-items:center;
  gap:8px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.08);
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
}

.live-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#00ff99;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:.4;}
  100%{opacity:1;}
}

/* ================= HERO ================= */

.hero{
  padding:20px 16px;
}

.hero-card{
  background:linear-gradient(145deg,#111827,#0f172a);
  border-radius:28px;
  padding:24px;
  border:1px solid rgba(255,255,255,0.06);
  position:relative;
  overflow:hidden;
}

.hero-card::before{
  content:"";
  position:absolute;
  width:250px;
  height:250px;
  background:rgba(0,255,153,0.08);
  border-radius:50%;
  top:-120px;
  right:-120px;
}

.hero-title{
  font-size:34px;
  font-weight:800;
  line-height:1.1;
  margin-bottom:12px;
}

.hero-sub{
  color:#94a3b8;
  font-size:14px;
  line-height:1.7;
  margin-bottom:22px;
}

.hero-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.stat{
  background:rgba(255,255,255,0.04);
  border-radius:18px;
  padding:14px;
}

.stat-label{
  color:#94a3b8;
  font-size:12px;
  margin-bottom:6px;
}

.stat-value{
  font-size:20px;
  font-weight:800;
  color:#00ff99;
}

/* ================= FILTERS ================= */

.filters{
  padding:0 16px 18px;
}

.filter-wrap{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.filter-btn{
  min-width:max-content;
  border:none;
  background:#111827;
  color:#cbd5e1;
  padding:10px 16px;
  border-radius:999px;
  font-size:13px;
  border:1px solid rgba(255,255,255,0.08);
}

.filter-btn.active{
  background:#00ff99;
  color:black;
  font-weight:700;
}

/* ================= OPPORTUNITIES ================= */

.section-title{
  padding:0 16px 16px;
  font-size:22px;
  font-weight:800;
}

.opportunities{
  padding:0 16px 100px;
}

.card{
  background:linear-gradient(145deg,#111827,#0b1220);
  border-radius:26px;
  padding:18px;
  margin-bottom:18px;
  border:1px solid rgba(255,255,255,0.06);
  position:relative;
  overflow:hidden;
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:16px;
}

.coin{
  font-size:24px;
  font-weight:800;
}

.pair{
  color:#94a3b8;
  font-size:13px;
}

.spread{
  font-size:28px;
  font-weight:800;
  color:#00ff99;
}

.trade-flow{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}

.exchange-box{
  background:#0f172a;
  border-radius:18px;
  padding:14px;
  text-align:center;
}

.exchange-label{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:8px;
}

.exchange-name{
  font-size:18px;
  font-weight:700;
  margin-bottom:8px;
}

.price{
  color:#00ff99;
  font-size:14px;
  font-weight:700;
}

.arrow{
  font-size:26px;
  color:#00ff99;
}

/* ================= DETAILS ================= */

.details-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:16px;
}

.detail-box{
  background:#0f172a;
  border-radius:16px;
  padding:14px;
}

.detail-label{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:6px;
}

.detail-value{
  font-size:15px;
  font-weight:700;
}

/* ================= NETWORKS ================= */

.networks{
  margin-top:12px;
}

.network-title{
  margin-bottom:10px;
  color:#94a3b8;
  font-size:13px;
}

.network-list{
  display:flex;
  gap:8px;
  overflow-x:auto;
}

.network{
  background:#0f172a;
  border-radius:12px;
  padding:10px;
  min-width:120px;
  border:1px solid rgba(255,255,255,0.06);
}

.network-name{
  font-size:13px;
  font-weight:700;
  margin-bottom:8px;
}

.network-status{
  font-size:11px;
  margin-bottom:4px;
}

.green{
  color:#00ff99;
}

.red{
  color:#ff6b6b;
}

.orange{
  color:#ffb020;
}

/* ================= RISK ================= */

.risk{
  margin-top:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.risk-badge{
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.risk-low{
  background:rgba(0,255,153,0.12);
  color:#00ff99;
}

.risk-medium{
  background:rgba(255,176,32,0.12);
  color:#ffb020;
}

.risk-high{
  background:rgba(255,107,107,0.12);
  color:#ff6b6b;
}

.trade-btn{
  flex:1;
  border:none;
  background:linear-gradient(90deg,#00ff99,#00c2ff);
  color:black;
  font-weight:800;
  padding:14px;
  border-radius:16px;
}

/* ================= CHART ================= */

.chart-wrap{
  margin-top:16px;
  background:#0f172a;
  border-radius:20px;
  padding:14px;
}

canvas{
  width:100% !important;
  height:180px !important;
}

/* ================= BOTTOM NAV ================= */

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(5,8,22,0.96);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  z-index:999;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:11px;
  color:#94a3b8;
  gap:4px;
}

.nav-icon{
  font-size:22px;
}

.active-nav{
  color:#00ff99;
}

/* ================= LOADER ================= */

.loader{
  text-align:center;
  padding:80px 20px;
}

.spinner{
  width:60px;
  height:60px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.08);
  border-top:4px solid #00ff99;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

.loading-text{
  margin-top:18px;
  color:#94a3b8;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .hero-title{
    font-size:28px;
  }

  .hero-stats{
    grid-template-columns:1fr;
  }

  .details-grid{
    grid-template-columns:1fr;
  }

  .spread{
    font-size:24px;
  }

}

</style>
</head>

<body>

<div class="header">

  <div class="header-top">

    <div class="logo">
      ArbiMine
    </div>

    <div class="live-box">
      <div class="live-dot"></div>
      <span id="scanTime">LIVE</span>
    </div>

  </div>

</div>

<section class="hero">

  <div class="hero-card">

    <div class="hero-title">
      Real Crypto Arbitrage Scanner
    </div>

    <div class="hero-sub">
      Real-time spreads, networks, liquidity and transfer status directly from exchanges.
    </div>

    <div class="hero-stats">

      <div class="stat">
        <div class="stat-label">
          Opportunities
        </div>
        <div class="stat-value" id="oppCount">
          0
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">
          Highest Spread
        </div>
        <div class="stat-value" id="highestSpread">
          0%
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">
          Tradable
        </div>
        <div class="stat-value" id="tradableCount">
          0
        </div>
      </div>

    </div>

  </div>

</section>

<section class="filters">

  <div class="filter-wrap">

    <button class="filter-btn active">
      All
    </button>

    <button class="filter-btn">
      Low Risk
    </button>

    <button class="filter-btn">
      Tradable
    </button>

    <button class="filter-btn">
      High Spread
    </button>

  </div>

</section>

<div class="section-title">
  Live Opportunities
</div>

<div id="opportunities" class="opportunities">

  <div class="loader">

    <div class="spinner"></div>

    <div class="loading-text">
      Scanning exchanges...
    </div>

  </div>

</div>

<div class="bottom-nav">

  <div class="nav-item active-nav">
    <div class="nav-icon">📊</div>
    <div>Scanner</div>
  </div>

  <div class="nav-item">
    <div class="nav-icon">💎</div>
    <div>Pro</div>
  </div>

  <div class="nav-item">
    <div class="nav-icon">👤</div>
    <div>Profile</div>
  </div>

</div>

<script>

let chartInstances = {};

async function loadOpportunities(){

  try{

    const res =
    await fetch("/api/opportunities");

    const data =
    await res.json();

    const opportunities =
    data.opportunities || [];

    renderStats(opportunities);

    renderOpportunities(opportunities);

    const scanDate =
    new Date(data.lastScan);

    document.getElementById(
      "scanTime"
    ).innerText =
    scanDate.toLocaleTimeString();

  }catch(err){

    document.getElementById(
      "opportunities"
    ).innerHTML = `
      <div class="loader">
        <div class="loading-text">
          Failed loading opportunities
        </div>
      </div>
    `;

  }

}

function renderStats(opps){

  document.getElementById(
    "oppCount"
  ).innerText = opps.length;

  let highest = 0;

  opps.forEach(o => {
    if(parseFloat(o.spread) > highest){
      highest = parseFloat(o.spread);
    }
  });

  document.getElementById(
    "highestSpread"
  ).innerText =
  highest.toFixed(2) + "%";

  const tradable =
  opps.filter(
    o => o.tradable
  ).length;

  document.getElementById(
    "tradableCount"
  ).innerText =
  tradable;

}

function renderOpportunities(opps){

  const container =
  document.getElementById(
    "opportunities"
  );

  if(!opps.length){

    container.innerHTML = `
      <div class="loader">
        <div class="loading-text">
          No opportunities found
        </div>
      </div>
    `;

    return;
  }

  container.innerHTML = "";

  opps.slice(0,50).forEach((opp,index) => {

    const riskClass =
    opp.risk === "low"
    ? "risk-low"
    : opp.risk === "high"
    ? "risk-high"
    : "risk-medium";

    const chartId =
    `chart-${index}`;

    const card =
    document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      <div class="card-top">

        <div>
          <div class="coin">
            ${opp.symbol}
          </div>

          <div class="pair">
            ${opp.symbol}/USDT
          </div>
        </div>

        <div class="spread">
          +${opp.spread}%
        </div>

      </div>

      <div class="trade-flow">

        <div class="exchange-box">

          <div class="exchange-label">
            BUY FROM
          </div>

          <div class="exchange-name">
            ${opp.buyExchange}
          </div>

          <div class="price">
            $${opp.buyPrice}
          </div>

        </div>

        <div class="arrow">
          →
        </div>

        <div class="exchange-box">

          <div class="exchange-label">
            SELL TO
          </div>

          <div class="exchange-name">
            ${opp.sellExchange}
          </div>

          <div class="price">
            $${opp.sellPrice}
          </div>

        </div>

      </div>

      <div class="details-grid">

        <div class="detail-box">

          <div class="detail-label">
            Buy Liquidity
          </div>

          <div class="detail-value">
            $${Number(opp.liquidity || 0).toLocaleString()}
          </div>

        </div>

        <div class="detail-box">

          <div class="detail-label">
            Tradable
          </div>

          <div class="detail-value ${opp.tradable ? 'green':'red'}">
            ${opp.tradable ? 'YES' : 'NO'}
          </div>

        </div>

        <div class="detail-box">

          <div class="detail-label">
            Withdraw
          </div>

          <div class="detail-value ${opp.buyWithdraw ? 'green':'red'}">
            ${opp.buyWithdraw ? 'OPEN' : 'SUSPENDED'}
          </div>

        </div>

        <div class="detail-box">

          <div class="detail-label">
            Deposit
          </div>

          <div class="detail-value ${opp.sellDeposit ? 'green':'red'}">
            ${opp.sellDeposit ? 'OPEN' : 'SUSPENDED'}
          </div>

        </div>

      </div>

      <div class="networks">

        <div class="network-title">
          BUY NETWORKS
        </div>

        <div class="network-list">

          ${
            Object.entries(opp.buyNetworks || {})
            .slice(0,5)
            .map(([name,net]) => `
              <div class="network">

                <div class="network-name">
                  ${name}
                </div>

                <div class="network-status ${net.withdraw ? 'green':'red'}">
                  Withdraw: ${net.withdraw ? 'ON':'OFF'}
                </div>

                <div class="network-status ${net.deposit ? 'green':'red'}">
                  Deposit: ${net.deposit ? 'ON':'OFF'}
                </div>

                <div class="network-status orange">
                  Fee: ${net.fee || 0}
                </div>

              </div>
            `).join("")
          }

        </div>

      </div>

      <div class="risk">

        <div class="risk-badge ${riskClass}">
          ${opp.risk.toUpperCase()} RISK
        </div>

        <button class="trade-btn">
          Analyze Trade
        </button>

      </div>

      <div class="chart-wrap">
        <canvas id="${chartId}"></canvas>
      </div>

    `;

    container.appendChild(card);

    drawChart(chartId,opp);

  });

}

function drawChart(id,opp){

  const ctx =
  document.getElementById(id);

  if(!ctx) return;

  const spread =
  parseFloat(opp.spread);

  const values = [
    spread * 0.4,
    spread * 0.7,
    spread * 0.9,
    spread * 1.2,
    spread * 1.0,
    spread
  ];

  new Chart(ctx,{

    type:"line",

    data:{
      labels:[
        "1m",
        "2m",
        "3m",
        "4m",
        "5m",
        "Now"
      ],

      datasets:[{
        label:"Spread %",
        data:values,
        tension:0.4,
        fill:true,
        borderColor:"#00ff99",
        backgroundColor:"rgba(0,255,153,0.08)",
        pointRadius:3
      }]
    },

    options:{
      responsive:true,
      maintainAspectRatio:false,

      plugins:{
        legend:{
          display:false
        }
      },

      scales:{
        x:{
          ticks:{
            color:"#94a3b8"
          },
          grid:{
            color:"rgba(255,255,255,0.04)"
          }
        },

        y:{
          ticks:{
            color:"#94a3b8"
          },
          grid:{
            color:"rgba(255,255,255,0.04)"
          }
        }
      }

    }

  });

}

loadOpportunities();

setInterval(() => {

  loadOpportunities();

},30000);

</script>

</body>
</html>
