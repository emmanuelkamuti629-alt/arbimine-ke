<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbiMine Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c15; font-family: 'Inter', system-ui, sans-serif; color: #eef2ff; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1, h2 { margin-bottom: 20px; }
    .card { background: #111827; border-radius: 20px; padding: 20px; margin-bottom: 30px; border: 1px solid #1f2937; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #1f2937; }
    th { color: #00ff99; }
    button { background: #334155; border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-right: 8px; }
    button.danger { background: #5a1a1a; color: #ff8a8a; }
    button.success { background: #0f5132; color: #00ff99; }
    input, select { background: #1f2937; border: 1px solid #374151; padding: 8px; border-radius: 8px; color: white; margin: 4px; }
    .login-container { max-width: 400px; margin: 100px auto; background: #111827; padding: 30px; border-radius: 24px; }
    .hidden { display: none; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; padding: 12px 20px; border-radius: 12px; border-left: 4px solid; }
    .toast.success { border-left-color: #00ff99; }
    .toast.error { border-left-color: #ff4d4d; }
  </style>
</head>
<body>
<div id="loginDiv" class="login-container">
  <h2>Admin Login</h2>
  <input type="text" id="adminUser" placeholder="Username" value="admin"><br>
  <input type="password" id="adminPass" placeholder="Password"><br>
  <button onclick="adminLogin()">Login</button>
</div>

<div id="dashboardDiv" class="container hidden">
  <h1>ArbiMine Admin Dashboard</h1>
  <div class="card">
    <h2>Users</h2>
    <table id="usersTable">
      <thead><tr><th>Username</th><th>Email</th><th>Mobile</th><th>Tier</th><th>Expires At</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="card">
    <h2>Payment Transactions</h2>
    <table id="transactionsTable">
      <thead><tr><th>Reference</th><th>User</th><th>Plan</th><th>Amount (KES)</th><th>Status</th><th>Date</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="card">
    <h2>Stats</h2>
    <div id="stats"></div>
  </div>
</div>

<script>
  let adminToken = localStorage.getItem('adminToken');
  if (adminToken) showDashboard();

  async function adminLogin() {
    const username = document.getElementById('adminUser').value;
    const password = document.getElementById('adminPass').value;
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('adminToken', data.token);
      showDashboard();
    } else {
      alert('Login failed');
    }
  }

  async function showDashboard() {
    document.getElementById('loginDiv').style.display = 'none';
    document.getElementById('dashboardDiv').classList.remove('hidden');
    await loadUsers();
    await loadTransactions();
    await loadStats();
  }

  async function loadUsers() {
    const token = localStorage.getItem('adminToken');
    const res = await fetch('/admin/users', { headers: { 'Authorization': token } });
    const users = await res.json();
    const tbody = document.querySelector('#usersTable tbody');
    tbody.innerHTML = '';
    users.forEach(user => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = user.username;
      row.insertCell(1).innerText = user.email;
      row.insertCell(2).innerText = user.mpesa;
      row.insertCell(3).innerText = user.subscription?.active ? (user.subscription.plan || 'Active') : 'Free';
      row.insertCell(4).innerText = user.subscription?.expiresAt ? new Date(user.subscription.expiresAt).toLocaleString() : 'N/A';
      const actions = row.insertCell(5);
      const activateBtn = document.createElement('button');
      activateBtn.innerText = user.subscription?.active ? 'Deactivate' : 'Activate Weekly';
      activateBtn.onclick = () => updateSubscription(user._id, !user.subscription?.active, 'weekly', null);
      const deleteBtn = document.createElement('button');
      deleteBtn.innerText = 'Delete';
      deleteBtn.className = 'danger';
      deleteBtn.onclick = () => deleteUser(user._id);
      actions.appendChild(activateBtn);
      actions.appendChild(deleteBtn);
    });
  }

  async function updateSubscription(userId, active, plan, expiresAt) {
    const token = localStorage.getItem('adminToken');
    const res = await fetch(`/admin/user/${userId}/update-subscription`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': token },
      body: JSON.stringify({ active, plan, expiresAt })
    });
    if (res.ok) {
      showToast('Subscription updated', 'success');
      loadUsers();
    } else {
      showToast('Failed', 'error');
    }
  }

  async function deleteUser(userId) {
    if (!confirm('Delete user? All data will be removed.')) return;
    const token = localStorage.getItem('adminToken');
    const res = await fetch(`/admin/user/${userId}`, {
      method: 'DELETE',
      headers: { 'Authorization': token }
    });
    if (res.ok) {
      showToast('User deleted', 'success');
      loadUsers();
      loadStats();
    } else {
      showToast('Delete failed', 'error');
    }
  }

  async function loadTransactions() {
    const token = localStorage.getItem('adminToken');
    const res = await fetch('/admin/transactions', { headers: { 'Authorization': token } });
    const transactions = await res.json();
    const tbody = document.querySelector('#transactionsTable tbody');
    tbody.innerHTML = '';
    transactions.forEach(tx => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = tx.reference;
      row.insertCell(1).innerText = tx.user;
      row.insertCell(2).innerText = tx.plan;
      row.insertCell(3).innerText = tx.amount;
      row.insertCell(4).innerHTML = `<span style="color:${tx.status === 'success' ? '#00ff99' : (tx.status === 'failed' ? '#ff8a8a' : '#ffcc00')}">${tx.status}</span>`;
      row.insertCell(5).innerText = new Date(tx.createdAt).toLocaleString();
    });
  }

  async function loadStats() {
    const token = localStorage.getItem('adminToken');
    const [usersRes, txRes] = await Promise.all([
      fetch('/admin/users', { headers: { 'Authorization': token } }),
      fetch('/admin/transactions', { headers: { 'Authorization': token } })
    ]);
    const users = await usersRes.json();
    const transactions = await txRes.json();
    const totalUsers = users.length;
    const activeSubs = users.filter(u => u.subscription?.active).length;
    const totalSuccess = transactions.filter(t => t.status === 'success').reduce((sum, t) => sum + t.amount, 0);
    const totalFailed = transactions.filter(t => t.status === 'failed').length;
    document.getElementById('stats').innerHTML = `
      <p>Total Users: ${totalUsers}</p>
      <p>Active Subscriptions: ${activeSubs}</p>
      <p>Total Successful Payments: KES ${totalSuccess}</p>
      <p>Failed Payments: ${totalFailed}</p>
    `;
  }

  function showToast(msg, type) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
</script>
</body>
</html>
